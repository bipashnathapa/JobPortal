<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Portal - Login/Register</title>
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: #f0f8ff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .container {
    display: flex;
    gap: 2rem;
  }

  .card {
    background: #fff;
    padding: 2rem;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    width: 300px;
  }

  h2 {
    text-align: center;
    margin-bottom: 1rem;
    color: #333;
  }

  input {
    width: 100%;
    padding: 0.7rem;
    margin-bottom: 1rem;
    border-radius: 8px;
    border: 1px solid #ccc;
  }

  button {
    width: 100%;
    padding: 0.7rem;
    border: none;
    border-radius: 8px;
    background-color: #ff6eb4;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    background-color: #ff85c1;
  }

  small {
    display: block;
    text-align: center;
    margin-top: 0.5rem;
    color: #666;
  }
</style>
</head>
<body>

<div class="container">
  <!-- Student Card -->
  <div class="card" id="student-card">
    <h2>Student</h2>
    <input type="text" id="student-username" placeholder="Username">
    <input type="email" id="student-email" placeholder="Email">
    <input type="password" id="student-password" placeholder="Password">
    <select id="student-action">
      <option value="register">Register</option>
      <option value="login">Login</option>
    </select>
    <button onclick="handleSubmit('student')">Go</button>
    <small id="student-msg"></small>
  </div>

  <!-- Employer Card -->
  <div class="card" id="employer-card">
    <h2>Employer</h2>
    <input type="text" id="employer-username" placeholder="Username">
    <input type="email" id="employer-email" placeholder="Email">
    <input type="password" id="employer-password" placeholder="Password">
    <select id="employer-action">
      <option value="register">Register</option>
      <option value="login">Login</option>
    </select>
    <button onclick="handleSubmit('employer')">Go</button>
    <small id="employer-msg"></small>
  </div>
</div>

<script>
async function handleSubmit(role) {
  const username = document.getElementById(`${role}-username`).value;
  const email = document.getElementById(`${role}-email`).value;
  const password = document.getElementById(`${role}-password`).value;
  const action = document.getElementById(`${role}-action`).value;
  const msgEl = document.getElementById(`${role}-msg`);

  if (!username || !password || (action === 'register' && !email)) {
    msgEl.textContent = "Please fill all required fields!";
    return;
  }

  try {
    const res = await fetch(`/api/${action}/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, role, email })
    });

    const data = await res.json();

    if (!res.ok) {
      msgEl.textContent = data.error || 'Error';
      return;
    }

    if (action === 'register') {
      msgEl.textContent = "Registered! Check your email to verify.";
      return;
    }

    // Login redirect
    localStorage.setItem('role', data.role);
    if (data.role === 'student') {
      window.location.href = '/api/student-dashboard/';
    } else if (data.role === 'employer') {
      window.location.href = '/api/employer-dashboard/';
    } else {
      msgEl.textContent = 'Unknown role';
    }

  } catch (err) {
    msgEl.textContent = "Server error. Try again later.";
    console.error(err);
  }
}
</script>

</body>
</html>
